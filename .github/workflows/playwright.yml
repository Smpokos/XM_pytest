name: Playwright Tests — xm.com (Python/Pytest)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Run Pytest Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Create auth directory
        run: mkdir -p playwright/.auth

      - name: Run Playwright tests
        run: |
          pytest tests/ \
            --browser chromium \
            --html=playwright-report/report.html \
            --self-contained-html \
            --tb=short \
            -v
        env:
          CI: true

      - name: Upload HTML report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Post test summary
        if: always()
        run: |
          echo "## Playwright/Pytest Results" >> $GITHUB_STEP_SUMMARY
          echo "See the **playwright-report** artifact for the full HTML report." >> $GITHUB_STEP_SUMMARY
          if pytest tests/ --browser chromium --co -q 2>/dev/null | tail -1; then
            echo "Tests collected successfully." >> $GITHUB_STEP_SUMMARY
          fi
